services:
  postgres:
    image: postgres:17-alpine
    container_name: psi-agenda-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: psi_agenda
      POSTGRES_USER: psi
      POSTGRES_PASSWORD: psi
    ports:
      - "5432:5432"
    volumes:
      - psi_agenda_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U psi -d psi_agenda"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: src/PsiAgenda.Api/Dockerfile
    container_name: psi-agenda-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=psi_agenda;Username=psi;Password=psi
      Jwt__Issuer: psi-agenda-api
      Jwt__Audience: psi-agenda-app
      Jwt__SigningKey: dev-only-signing-key-change-this-in-production-please
      BusinessClock__TimeZoneId: America/Sao_Paulo
      BusinessClock__UtcOffset: "-03:00"
      MeetingRoom__BaseUrl: https://meet.jit.si
    ports:
      - "3001:8080"
    volumes:
      - psi_agenda_uploads:/app/wwwroot/uploads
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  psi_agenda_pgdata:
  psi_agenda_uploads:
