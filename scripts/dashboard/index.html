<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Deploy | Psi Agenda</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-panel: rgba(30, 41, 59, 0.7);
            --border-glow: rgba(56, 189, 248, 0.3);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --success-glow: rgba(16, 185, 129, 0.4);
            --danger: #ef4444;
            --danger-glow: rgba(239, 68, 68, 0.4);
            --warning: #f59e0b;
            --warning-glow: rgba(245, 158, 11, 0.4);
            --accent: #38bdf8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.15) 0px, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }

        header {
            width: 100%;
            max-width: 1000px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            background: linear-gradient(to right, #fff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .glass-panel {
            background: var(--bg-panel);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
            padding: 2rem;
            width: 100%;
            max-width: 1000px;
            animation: fadeInUp 0.8s ease-out;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-panel.deploying {
            border-color: var(--border-glow);
            box-shadow: 0 0 20px var(--border-glow);
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .status-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .status-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-card-title {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 500;
        }

        .action-btn {
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid rgba(56, 189, 248, 0.3);
            color: var(--accent);
            padding: 0.3rem 0.8rem;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: none; /* hidden by default, shown if offline */
        }
        .action-btn:hover {
            background: rgba(56, 189, 248, 0.2);
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.4);
        }
        .action-btn:active {
            transform: scale(0.95);
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }

        .dot.online {
            background-color: var(--success);
            box-shadow: 0 0 10px var(--success-glow);
        }

        .dot.offline {
            background-color: var(--danger);
            box-shadow: 0 0 10px var(--danger-glow);
            animation: pulse-danger 2s infinite;
        }

        .dot.active {
            background-color: var(--warning);
            box-shadow: 0 0 10px var(--warning-glow);
            animation: pulse-warning 1.5s infinite;
        }

        .dot.idle {
            background-color: var(--text-muted);
        }

        .terminal-container {
            background: #000;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .terminal-header {
            background: rgba(255, 255, 255, 0.05);
            padding: 0.8rem 1rem;
            display: flex;
            gap: 0.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .mac-btn {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        .mac-btn.close { background: #ff5f56; }
        .mac-btn.min { background: #ffbd2e; }
        .mac-btn.max { background: #27c93f; }

        .terminal-body {
            padding: 1.5rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            color: #a9b7c6;
            height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.5;
        }

        .terminal-body::-webkit-scrollbar {
            width: 8px;
        }
        .terminal-body::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }
        .terminal-body::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
        .terminal-body::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @keyframes pulse-warning {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(245, 158, 11, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); }
        }

        @keyframes pulse-danger {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .shimmer {
            color: var(--accent);
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }
    </style>
</head>
<body>

    <header>
        <h1>Painel de Deploy</h1>
        <div style="color: var(--text-muted); font-size: 0.9rem;">Psi Agenda</div>
    </header>

    <div class="glass-panel" id="main-panel">
        <div class="status-grid">
            <div class="status-card">
                <div class="status-card-header">
                    <div class="status-card-title">GitHub Runner</div>
                    <button id="start-runner-btn" class="action-btn" onclick="startRunner()">Ligar Runner</button>
                </div>
                <div class="status-indicator">
                    <span class="dot" id="runner-dot"></span>
                    <span id="runner-text">Verificando...</span>
                </div>
            </div>
            <div class="status-card">
                <div class="status-card-title">Status do Deploy</div>
                <div class="status-indicator">
                    <span class="dot" id="deploy-dot"></span>
                    <span id="deploy-text">Verificando...</span>
                </div>
            </div>
        </div>

        <div class="terminal-container">
            <div class="terminal-header">
                <div class="mac-btn close"></div>
                <div class="mac-btn min"></div>
                <div class="mac-btn max"></div>
                <div style="margin-left: auto; font-size: 0.8rem; color: var(--text-muted); font-family: 'JetBrains Mono', monospace;">deploy.log</div>
            </div>
            <div class="terminal-body" id="terminal-logs">
                Iniciando monitoramento...
            </div>
        </div>
    </div>

    <script>
        const runnerDot = document.getElementById('runner-dot');
        const runnerText = document.getElementById('runner-text');
        const deployDot = document.getElementById('deploy-dot');
        const deployText = document.getElementById('deploy-text');
        const terminalLogs = document.getElementById('terminal-logs');
        const mainPanel = document.getElementById('main-panel');
        const startRunnerBtn = document.getElementById('start-runner-btn');

        let isUserScrolling = false;
        let isStartingRunner = false;

        terminalLogs.addEventListener('scroll', () => {
            const isAtBottom = terminalLogs.scrollHeight - terminalLogs.scrollTop <= terminalLogs.clientHeight + 10;
            isUserScrolling = !isAtBottom;
        });

        function autoScroll() {
            if (!isUserScrolling) {
                terminalLogs.scrollTop = terminalLogs.scrollHeight;
            }
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag])
            );
        }

        async function startRunner() {
            if (isStartingRunner) return;
            isStartingRunner = true;
            startRunnerBtn.textContent = 'Ligando...';
            startRunnerBtn.style.opacity = '0.5';
            
            try {
                await fetch('/api/start-runner', { method: 'POST' });
            } catch (e) {
                console.error(e);
            }
            
            setTimeout(() => {
                isStartingRunner = false;
            }, 3000);
        }

        async function fetchStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();

                // Update Runner Status
                if (data.runner_active) {
                    runnerDot.className = 'dot online';
                    runnerText.textContent = 'Ativo e Online';
                    runnerText.style.color = 'var(--text-main)';
                    startRunnerBtn.style.display = 'none';
                    if (isStartingRunner) {
                        isStartingRunner = false;
                        startRunnerBtn.textContent = 'Ligar Runner';
                        startRunnerBtn.style.opacity = '1';
                    }
                } else {
                    runnerDot.className = 'dot offline';
                    runnerText.textContent = 'Serviço Desligado';
                    runnerText.style.color = 'var(--danger)';
                    startRunnerBtn.style.display = 'block';
                }

                // Update Deploy Status
                if (data.deploying) {
                    deployDot.className = 'dot active';
                    deployText.textContent = 'Deploy em Andamento...';
                    deployText.className = 'shimmer';
                    mainPanel.classList.add('deploying');
                } else {
                    deployDot.className = 'dot idle';
                    deployText.textContent = 'Aguardando Commits';
                    deployText.className = '';
                    mainPanel.classList.remove('deploying');
                }

                // Update Logs
                if (data.logs && data.logs.length > 0) {
                    const formattedLogs = data.logs.map(line => {
                        let safeLine = escapeHTML(line);
                        // Simple coloring for common docker/build terms
                        if (safeLine.includes('Error') || safeLine.includes('ERRO')) safeLine = `<span style="color: #ff5f56;">${safeLine}</span>`;
                        if (safeLine.includes('==>')) safeLine = `<span style="color: #38bdf8; font-weight: bold;">${safeLine}</span>`;
                        if (safeLine.includes('Success') || safeLine.includes('Deploy concluido')) safeLine = `<span style="color: #27c93f;">${safeLine}</span>`;
                        return safeLine;
                    }).join('\n');
                    
                    if (terminalLogs.innerHTML !== formattedLogs) {
                        terminalLogs.innerHTML = formattedLogs;
                        autoScroll();
                    }
                }

            } catch (error) {
                runnerDot.className = 'dot offline';
                runnerText.textContent = 'Desconectado do servidor';
                deployDot.className = 'dot offline';
                deployText.textContent = 'Aguardando conexão...';
            }
        }

        // Fetch immediately, then every 2 seconds
        fetchStatus();
        setInterval(fetchStatus, 2000);
    </script>
</body>
</html>
