services:
  postgres:
    image: postgres:17-alpine
    container_name: psi-agenda-postgres
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - psi_agenda_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - psi_agenda

  api:
    build:
      context: ./backend
      dockerfile: src/PsiAgenda.Api/Dockerfile
    container_name: psi-agenda-api
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      APP_VERSION: ${APP_VERSION:-1}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - psi_agenda_uploads:/app/wwwroot/uploads
    ports:
      - "127.0.0.1:3001:8080"
    networks:
      - psi_agenda

volumes:
  psi_agenda_pgdata:
  psi_agenda_uploads:

networks:
  psi_agenda:
