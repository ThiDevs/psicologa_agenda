name: Deploy API

on:
  push:
    branches:
      - main

jobs:
  verify-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4



      - name: Execute Local Deploy Script
        run: |
          set -euo pipefail
          cd /home/prod/.gemini/antigravity/scratch/psi-agenda
          set -a
          source .env.prod
          set +a
          bash ./deploy-prod.sh
