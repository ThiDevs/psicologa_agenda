name: Deploy API

on:
  push:
    branches:
      - main

jobs:
  verify-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify frontend
        run: npm run verify

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build backend
        run: dotnet build backend/src/PsiAgenda.Api/PsiAgenda.Api.csproj --configuration Release

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: \${{ secrets.PROD_HOST }}
          username: \${{ secrets.PROD_USER }}
          key: \${{ secrets.PROD_SSH_KEY }}
          port: \${{ secrets.PROD_PORT }}
          script: |
            set -euo pipefail
            cd /opt/psi-agenda
            set -a
            source .env.prod
            set +a
            ./deploy-prod.sh
